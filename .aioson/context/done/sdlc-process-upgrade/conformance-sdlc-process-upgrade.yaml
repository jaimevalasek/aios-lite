# Conformance Contract — sdlc-process-upgrade
# Generated by: @analyst
# Date: 2026-04-24

feature: sdlc-process-upgrade
spec_version: 1
generated_at: "2026-04-24"

acceptance_criteria:
  - id: AC-SDLC-01
    description: "Operational plans are never written to docs/pt"
    type: path_contract
    preconditions:
      - "an agent is creating an operational or phased plan"
    action: "choose destination path"
    expected:
      - "docs/pt is rejected for operational plans"
      - "destination is .aioson/plans/{slug}/ or .aioson/context/implementation-plan-{slug}.md"
    negative_cases:
      - input: "docs/pt/plano-*.md"
        expected: "invalid destination"

  - id: AC-SDLC-02
    description: "Root plans is source-only except source-manifest"
    type: path_contract
    preconditions:
      - "root plans/*.md contains pre-production analysis"
    action: "@product or @sheldon consumes source material"
    expected:
      - "source may be read"
      - "plans/source-manifest.md may be updated"
      - "no executable plan is created in root plans"
    negative_cases:
      - input: "plans/implementation-plan-foo.md"
        expected: "invalid executable artifact"

  - id: AC-SDLC-03
    description: "Project map covers product/process agents"
    type: prompt_contract
    preconditions:
      - "project-map path rules are loaded"
    action: "product/process agent creates an artifact"
    expected:
      - "product, sheldon, pm, orchestrator, and discover follow canonical paths"
    negative_cases:
      - input: "agent not covered by path map"
        expected: "rule or prompt coverage must be added"

  - id: AC-SDLC-04
    description: "Agents distinguish plan artifact types"
    type: behavior
    preconditions:
      - "user asks for a plano/plan"
    action: "agent decides output type"
    expected:
      - "agent distinguishes source plan, phased Sheldon plan, PM implementation plan, and public docs"
    negative_cases:
      - input: "ambiguous plan destination"
        expected: "agent explains destination and type before writing"

  - id: AC-SDLC-05
    description: "Blocked gates report missing evidence and owner"
    type: cli_behavior
    preconditions:
      - "Gate A/B/C/D is blocked"
    action: "run gate:check or produce handoff"
    expected:
      - "output lists missing evidence"
      - "output lists responsible next agent"
    negative_cases:
      - input: "blocked gate without owner"
        expected: "invalid handoff"

  - id: AC-SDLC-06
    description: "Approval messages include exact approval path"
    type: ux
    preconditions:
      - "agent says a gate needs approval"
    action: "show user-facing message"
    expected:
      - "message includes exact CLI command or precise manual fallback"
    negative_cases:
      - input: "precisa aprovar"
        expected: "insufficient without how-to-approve"

  - id: AC-SDLC-07
    description: "Gate parser uses deterministic machine-readable format"
    type: parser
    preconditions:
      - "spec-{slug}.md contains gate fields"
    action: "parse gates through CLI"
    expected:
      - "flat fields or valid JSON are parsed"
      - "nested YAML without support does not pass accidentally"
    negative_cases:
      - input: "phase_gates nested YAML only"
        expected: "test exposes unsupported format or parser is enhanced"

  - id: AC-SDLC-08
    description: "workflow next explains blocked gate next action"
    type: cli_behavior
    preconditions:
      - "workflow:next blocks on a gate"
    action: "print next action"
    expected:
      - "output names the next agent or gate command"
      - "output explains why"
    negative_cases:
      - input: "generic blocked message"
        expected: "insufficient"

  - id: AC-SDLC-09
    description: "Dev stops before implementation when Gate C is missing"
    type: prompt_contract
    preconditions:
      - "MEDIUM feature"
      - "Gate C is not approved"
    action: "@dev starts"
    expected:
      - "@dev does not implement"
      - "@dev explains how to obtain or approve implementation plan"
    negative_cases:
      - input: "@dev writes code before Gate C"
        expected: "workflow violation"

  - id: AC-SDLC-10
    description: "State commands agree on next missing artifact and next agent"
    type: cli_behavior
    preconditions:
      - "feature has partial artifact chain"
    action: "run workflow:status, workflow:next, preflight, artifact:validate"
    expected:
      - "commands agree on next_missing and next_agent"
    negative_cases:
      - input: "commands disagree"
        expected: "regression"

  - id: AC-SDLC-11
    description: "New chat recognizes completed previous phase"
    type: continuity
    preconditions:
      - "canonical artifact from previous phase exists"
    action: "next agent starts in a new chat"
    expected:
      - "agent does not claim previous phase is missing"
    negative_cases:
      - input: "artifact exists but agent asks to redo phase"
        expected: "continuity failure"

  - id: AC-SDLC-12
    description: "agent:done persists enough handoff state"
    type: runtime
    preconditions:
      - "official agent completes a phase"
    action: "run agent:done"
    expected:
      - "state includes last gate, produced artifacts, and next action"
    negative_cases:
      - input: "agent:done without next action"
        expected: "insufficient state"

  - id: AC-SDLC-13
    description: "Stale dev-state is warning, not active execution state"
    type: preflight
    preconditions:
      - "dev-state belongs to a different done feature"
    action: "run preflight for current feature"
    expected:
      - "dev_state_relation is warning/context"
      - "not treated as active state"
    negative_cases:
      - input: "different feature dev-state treated as active"
        expected: "regression"

  - id: AC-SDLC-14
    description: "workflow execute dry-run blockers match reality"
    type: cli_behavior
    preconditions:
      - "feature has incomplete gates/artifacts"
    action: "run workflow:execute --dry-run --feature={slug}"
    expected:
      - "blockers match artifact and gate state"
      - "help lists --feature"
    negative_cases:
      - input: "help omits required feature flag"
        expected: "documentation/help mismatch"

  - id: AC-SDLC-15
    description: "PM produces implementation plan for MEDIUM"
    type: artifact
    preconditions:
      - "MEDIUM feature reaches PM phase"
    action: "@pm completes"
    expected:
      - ".aioson/context/implementation-plan-{slug}.md exists or blocker is explicit"
      - "status is approved when Gate C passes"
    negative_cases:
      - input: "PM completes with no plan and no blocker"
        expected: "Gate C cannot pass"

  - id: AC-SDLC-16
    description: "Implementation plan ownership is consistent"
    type: prompt_contract
    preconditions:
      - "prompts, rules, SDD refs, and CLI validators are compared"
    action: "review ownership statements"
    expected:
      - "all sources agree @pm owns initial MEDIUM implementation plan"
    negative_cases:
      - input: "artifact-map says @dev owns initial plan"
        expected: "must be corrected"

  - id: AC-SDLC-17
    description: "Gate C remains blocked for draft/blocked plan"
    type: gate
    preconditions:
      - "implementation plan exists"
      - "status is not approved"
    action: "run gate:check --gate=C"
    expected:
      - "Gate C is blocked"
      - "responsible agent is @pm"
    negative_cases:
      - input: "draft plan passes Gate C"
        expected: "regression"

  - id: AC-SDLC-18
    description: "Dev treats final PM decisions as final"
    type: prompt_contract
    preconditions:
      - "Gate C approved"
      - "implementation plan marks decisions as final/pre-taken"
    action: "@dev starts implementation"
    expected:
      - "@dev follows plan without reopening product decisions"
    negative_cases:
      - input: "@dev re-discusses settled decision"
        expected: "workflow friction"

  - id: AC-SDLC-19
    description: "Sheldon preflight includes PRD and enrichment context"
    type: preflight
    preconditions:
      - "PRD exists for feature"
    action: "run preflight --agent=sheldon --feature={slug}"
    expected:
      - "context_package includes PRD"
      - "context_package includes relevant enrichment/status files when present"
    negative_cases:
      - input: "context package only has project.context.md"
        expected: "false READY risk"

  - id: AC-SDLC-20
    description: "Orchestrator preflight blocks when requirements/spec/Gate C missing"
    type: preflight
    preconditions:
      - "requirements/spec/Gate C are absent or incomplete"
    action: "run preflight --agent=orchestrator --feature={slug}"
    expected:
      - "status is BLOCKED or READY_WITH_WARNINGS"
    negative_cases:
      - input: "READY with missing Gate C"
        expected: "false READY"

  - id: AC-SDLC-21
    description: "Orchestrator reads requirements and spec body"
    type: prompt_contract
    preconditions:
      - "@orchestrator runs in feature mode"
    action: "build worker context"
    expected:
      - "requirements-{slug}.md is read"
      - "spec-{slug}.md body is read, not only frontmatter"
    negative_cases:
      - input: "workers created without requirements"
        expected: "handoff bug"

  - id: AC-SDLC-22
    description: "artifact:validate reports next missing artifact and agent"
    type: cli_behavior
    preconditions:
      - "artifact chain is incomplete"
    action: "run artifact:validate --feature={slug}"
    expected:
      - "output includes next_missing"
      - "output includes next_agent"
    negative_cases:
      - input: "only lists all missing files"
        expected: "insufficient guidance"

  - id: AC-SDLC-23
    description: "Agents without readiness rules never default to READY silently"
    type: preflight
    preconditions:
      - "official agent has no specific readiness evaluator"
    action: "run preflight for that agent"
    expected:
      - "status includes warning or blocker for missing role-specific context"
    negative_cases:
      - input: "READY with only project.context.md"
        expected: "false READY"

  - id: AC-SDLC-24
    description: "Active manifest wins as execution artifact"
    type: precedence
    preconditions:
      - ".aioson/plans/{slug}/manifest.md exists"
      - "manifest status is not complete/done"
    action: "compute execution context"
    expected:
      - "active_execution_artifact is manifest"
    negative_cases:
      - input: "implementation plan overrides active manifest"
        expected: "wrong precedence"

  - id: AC-SDLC-25
    description: "Implementation plan is auxiliary while manifest is active"
    type: precedence
    preconditions:
      - "manifest and implementation plan coexist"
      - "manifest is active"
    action: "@dev starts"
    expected:
      - "manifest controls execution"
      - "implementation plan is supporting context"
    negative_cases:
      - input: "@dev follows implementation plan against active manifest"
        expected: "wrong execution artifact"

  - id: AC-SDLC-26
    description: "Dev context package includes exact phase context"
    type: preflight
    preconditions:
      - "@dev starts a specific manifest phase"
    action: "build context package"
    expected:
      - "package includes manifest, phase file, PRD, enrichment, requirements, spec, architecture, and plan when relevant"
    negative_cases:
      - input: "package omits phase file"
        expected: "insufficient context"

  - id: AC-SDLC-27
    description: "Dev skips completed manifest phases"
    type: continuity
    preconditions:
      - "one or more manifest phases are marked done"
    action: "@dev resumes"
    expected:
      - "completed phases are skipped"
      - "next pending phase is selected"
    negative_cases:
      - input: "@dev repeats done phase"
        expected: "state bug"

  - id: AC-SDLC-28
    description: "Deyvin applies same precedence as dev"
    type: prompt_contract
    preconditions:
      - "@deyvin continuity session"
      - "manifest and implementation plan coexist"
    action: "determine active execution artifact"
    expected:
      - "same precedence as @dev"
    negative_cases:
      - input: "@deyvin follows different artifact"
        expected: "continuity inconsistency"

  - id: AC-SDLC-29
    description: "Sheldon selects target PRD before early-exit"
    type: prompt_contract
    preconditions:
      - "multiple PRDs or stale global specs exist"
    action: "@sheldon starts"
    expected:
      - "target PRD is selected first"
      - "completion check applies only to selected slug"
    negative_cases:
      - input: "global spec causes early exit before PRD selection"
        expected: "RF-01 bug"

  - id: AC-SDLC-30
    description: "Project-level spec does not block feature enrichment"
    type: prompt_contract
    preconditions:
      - "project-level spec.md exists"
      - "feature PRD exists"
    action: "@sheldon analyzes selected PRD"
    expected:
      - "spec.md does not block feature enrichment"
    negative_cases:
      - input: "spec.md complete blocks unrelated PRD"
        expected: "early-exit bug"

  - id: AC-SDLC-31
    description: "PRD missing from features registry is warning with repair"
    type: prompt_contract
    preconditions:
      - "prd-{slug}.md exists"
      - "features.md lacks slug"
    action: "@sheldon starts"
    expected:
      - "warning and repair suggestion are produced"
      - "analysis continues if PRD is valid"
    negative_cases:
      - input: "missing registry blocks automatically"
        expected: "too rigid"

  - id: AC-SDLC-32
    description: "Product registers new feature"
    type: artifact
    preconditions:
      - "@product creates a new PRD"
    action: "session ends"
    expected:
      - "features.md includes slug, in_progress status, and start date"
    negative_cases:
      - input: "PRD exists but features.md lacks slug"
        expected: "registration bug"

  - id: AC-SDLC-33
    description: "Product handoff names next agent and pass criteria"
    type: handoff
    preconditions:
      - "@product completes PRD"
    action: "final message is produced"
    expected:
      - "message names next agent"
      - "message gives reason, PRD path, and pass criteria"
    negative_cases:
      - input: "handoff says continue without agent/path"
        expected: "unclear next step"

  - id: AC-SDLC-34
    description: "Bootstrap has four required files"
    type: memory
    preconditions:
      - "bootstrap memory exists after setup/discover"
    action: "check bootstrap directory"
    expected:
      - "what-is.md, what-it-does.md, how-it-works.md, current-state.md exist"
    negative_cases:
      - input: "what-is.md missing"
        expected: "bootstrap incomplete"

  - id: AC-SDLC-35
    description: "Discover refresh creates missing bootstrap files"
    type: memory
    preconditions:
      - "some bootstrap files exist and some are missing"
    action: "@discover refresh mode runs"
    expected:
      - "missing files are created"
      - "existing valid files are preserved or refreshed intentionally"
    negative_cases:
      - input: "refresh assumes partial cache is complete"
        expected: "memory bug"

  - id: AC-SDLC-36
    description: "devlog:process tests do not modify real devlogs"
    type: test
    preconditions:
      - "devlog:process is tested"
    action: "run test suite"
    expected:
      - "fixture/copy is used"
      - "real devlogs are untouched"
    negative_cases:
      - input: "test writes processed_at to real project devlogs"
        expected: "unsafe test"

  - id: AC-SDLC-37
    description: "agent:done and pulse:update support resume"
    type: runtime
    preconditions:
      - "agent completes and emits done/pulse update"
    action: "new agent starts"
    expected:
      - "project-pulse includes last_agent, last_gate, active feature, blockers, and next action"
    negative_cases:
      - input: "pulse lacks next action"
        expected: "resume ambiguity"

  - id: AC-SDLC-38
    description: "CLI help lists real workflow execute flags"
    type: cli_behavior
    preconditions:
      - "user displays help"
    action: "inspect workflow:execute help"
    expected:
      - "--feature is listed"
      - "--tool, --start-from, and --max-checkpoints are listed if implemented"
    negative_cases:
      - input: "help omits implemented required flag"
        expected: "help mismatch"

  - id: AC-SDLC-39
    description: "Docs describe implemented behavior only"
    type: documentation
    preconditions:
      - "docs/pt is updated"
    action: "review docs against CLI/prompts"
    expected:
      - "docs match implemented behavior"
      - "operational planning docs are not added to docs/pt"
    negative_cases:
      - input: "docs/pt contains speculative plan"
        expected: "wrong destination"

  - id: AC-SDLC-40
    description: "Regression suite covers motivating bug classes"
    type: test
    preconditions:
      - "feature implementation is complete"
    action: "run regression suite"
    expected:
      - "tests cover path contract, gate approval UX, preflight readiness, Sheldon RF-01, plan precedence, and PM ownership"
    negative_cases:
      - input: "no tests for handoff/preflight/gate regressions"
        expected: "Gate D cannot pass"
