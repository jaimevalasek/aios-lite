# Conformance Contract — harness-driven-aioson
# Generated by: @analyst
# Verified by: @qa
# Date: 2026-04-10

feature: harness-driven-aioson
spec_version: 1
generated_at: "2026-04-10"

acceptance_criteria:

  # ── Fase 1 — Gateway Ativo ────────────────────────────────────────────────

  - id: AC-HD-01
    description: "Circuit breaker permite iteração quando dentro dos limites do governor"
    type: behavior
    preconditions:
      - "projeto MEDIUM com harness-contract.json presente em .aioson/plans/{slug}/"
      - "progress.json.circuit_state === 'CLOSED'"
      - "iterations < max_steps"
      - "consecutive_errors < error_streak_limit"
    action: "invocar circuit-breaker.check()"
    expected:
      - "retorna { allowed: true, reason: null }"
      - "progress.json não é modificado"
    negative_cases:
      - input: "iterations === max_steps"
        expected: "retorna { allowed: false, reason: 'max_steps_reached' }"
      - input: "circuit_state === 'OPEN'"
        expected: "retorna { allowed: false, reason: 'circuit_open' }"

  - id: AC-HD-02
    description: "Circuit abre quando max_steps é atingido"
    type: behavior
    preconditions:
      - "progress.json.iterations === governor.max_steps - 1"
      - "circuit_state === 'CLOSED'"
    action: "chamar recordError('iteração excedeu max_steps') após iteração que atinge o limite"
    expected:
      - "progress.json.circuit_state === 'OPEN'"
      - "progress.json.status === 'circuit_open'"
      - "progress.json.last_error contém razão legível"
      - "progress.json.last_updated é timestamp atual"
    negative_cases:
      - input: "governor.max_steps === 0"
        expected: "condição nunca ativa; circuit permanece CLOSED independente de iterations"

  - id: AC-HD-03
    description: "Backward-compatibility: projetos sem harness-contract.json funcionam idêntico ao pré-harness"
    type: behavior
    preconditions:
      - "projeto MICRO ou SMALL sem harness-contract.json"
    action: "executar qualquer comando existente (workflow:next, self:loop, verify:gate) sem flag --contract"
    expected:
      - "output idêntico ao comportamento pré-feature"
      - "nenhum arquivo de harness criado ou modificado"
      - "nenhum erro ou aviso relacionado ao harness"
    negative_cases:
      - input: "verify:gate sem --contract em qualquer projeto"
        expected: "comportamento atual exato — sem referência a harness-contract.json"

  - id: AC-HD-04
    description: "Circuit abre quando error_streak_limit é atingido"
    type: behavior
    preconditions:
      - "progress.json.consecutive_errors === governor.error_streak_limit - 1"
      - "circuit_state === 'CLOSED'"
    action: "chamar recordError('validation failed: C2')"
    expected:
      - "progress.json.consecutive_errors === governor.error_streak_limit"
      - "progress.json.circuit_state === 'OPEN'"
      - "progress.json.status === 'circuit_open'"
    negative_cases:
      - input: "governor.error_streak_limit === 0"
        expected: "condição nunca ativa; consecutive_errors acumula mas circuit permanece CLOSED"

  # ── Fase 2 — Contractual Handshake ───────────────────────────────────────

  - id: AC-HD-05
    description: "harness:init cria harness-contract.json e progress.json com estado inicial válido"
    type: behavior
    preconditions:
      - "projeto MEDIUM"
      - ".aioson/plans/my-feature/ não existe ou não contém harness-contract.json"
    action: "executar: aioson harness:init . --slug=my-feature"
    expected:
      - ".aioson/plans/my-feature/harness-contract.json criado com campos obrigatórios"
      - "harness-contract.json tem contract_mode === 'BALANCED', criteria: [], governor com defaults"
      - ".aioson/plans/my-feature/progress.json criado"
      - "progress.json tem: circuit_state='CLOSED', session_count=1, iterations=0, consecutive_errors=0, status='in_progress'"
    negative_cases:
      - input: "harness-contract.json já existe no path"
        expected: "aviso com path exato; exit 0; nenhum arquivo modificado"
      - input: "projeto MICRO sem --force"
        expected: "aviso que harness é opcional para MICRO; exit 0 sem criar arquivos"

  - id: AC-HD-06
    description: "harness:init é idempotente — não sobrescreve arquivos existentes"
    type: behavior
    preconditions:
      - "harness-contract.json já existe em .aioson/plans/my-feature/"
    action: "executar: aioson harness:init . --slug=my-feature (sem --force)"
    expected:
      - "saída contém aviso: 'harness-contract.json já existe em <path>'"
      - "arquivo não é modificado (conteúdo idêntico antes e depois)"
      - "exit code 0"
    negative_cases: []

  - id: AC-HD-07
    description: "progress.json permite @dev retomar sessão sem re-analisar o codebase"
    type: behavior
    preconditions:
      - "progress.json com session_count: 2, completed_steps: ['criado-circuit-breaker-js', 'registrado-harness-cli']"
    action: "@dev lê progress.json ao iniciar sessão e verifica completed_steps"
    expected:
      - "@dev identifica que 'criado-circuit-breaker-js' e 'registrado-harness-cli' já foram feitos"
      - "@dev parte do próximo step sem re-verificar os arquivos já concluídos"
      - "session_count incrementado para 3 ao final da sessão"
    negative_cases:
      - input: "progress.json com JSON inválido"
        expected: "novo progress.json criado com session_count: 2 (estimado), aviso ao usuário"

  - id: AC-HD-08
    description: "harness:validate invoca verify:gate --contract e atualiza progress.json"
    type: behavior
    preconditions:
      - "harness-contract.json com pelo menos 1 critério presente"
      - "progress.json com circuit_state CLOSED"
    action: "executar: aioson harness:validate . --slug=my-feature"
    expected:
      - "verify:gate é invocado com --contract=.aioson/plans/my-feature/harness-contract.json"
      - "resultado exibido por critério no terminal"
      - "progress.json atualizado: iterations++, last_error atualizado se falhou"
    negative_cases:
      - input: "circuit_state === 'OPEN'"
        expected: "harness:validate exibe estado do circuit e razão; não invoca verify:gate; exit 0 com aviso"

  # ── Fase 3 — Multi-Agent Validation Loop ─────────────────────────────────

  - id: AC-HD-09
    description: "@validator retorna JSON estruturado com resultado por critério do contrato"
    type: behavior
    preconditions:
      - "@validator invocado via aioson agent:prompt validator ."
      - "contexto: apenas harness-contract.json + arquivos em completed_steps"
    action: "@validator processa contrato e verifica arquivos listados"
    expected:
      - "output contém JSON válido com campos: phase, validation_at, results[], overall_score, ready_for_done_gate"
      - "results[] tem um entry por critério em harness-contract.json.criteria"
      - "cada entry tem: id, passed (boolean), reason (string|null)"
      - "overall_score === 0 se qualquer passed === false; === 1 se todos passed === true"
    negative_cases:
      - input: "harness-contract.json com criteria: []"
        expected: "overall_score: 1, ready_for_done_gate: true, results: []"

  - id: AC-HD-10
    description: "Feedback do @validator chega ao @dev com critério específico e razão acionável"
    type: behavior
    preconditions:
      - "@validator retornou results com C2 passed: false, reason: 'ESLint: no-unused-vars em src/harness/circuit-breaker.js:42'"
    action: "progress.json.last_error é atualizado com resultado; @dev lê"
    expected:
      - "progress.json.last_error contém: ID do critério (C2) + razão específica"
      - "@dev consegue navegar diretamente ao problema sem re-executar toda a validação"
      - "progress.json.consecutive_errors incrementado"
    negative_cases:
      - input: "@validator retorna JSON malformado"
        expected: "last_error: 'validator: malformed output'; consecutive_errors++"

  - id: AC-HD-11
    description: "Done gate bloqueia marcação de done quando critérios não passaram"
    type: behavior
    preconditions:
      - "progress.json.circuit_state === 'OPEN' OU último resultado com passed: false em algum critério"
    action: "tentativa de marcar feature como done em features.md"
    expected:
      - "operação bloqueada com mensagem listando critérios bloqueantes"
      - "features.md não modificado"
    negative_cases:
      - input: "progress.json.circuit_state === 'CLOSED' E todos criteria passed: true"
        expected: "done gate passa; feature pode ser marcada como done"

  - id: AC-HD-12
    description: "Loop para automaticamente quando error_streak_limit é atingido durante validação"
    type: behavior
    preconditions:
      - "self:loop --contract rodando com consecutive_errors === error_streak_limit - 1"
    action: "@validator retorna score 0 (nova falha)"
    expected:
      - "consecutive_errors === error_streak_limit"
      - "circuit_state === 'OPEN'"
      - "self:loop retorna com ok: false, reason: 'circuit_open'"
      - "usuário recebe mensagem com: razão, estado do progress.json, instrução para intervenção humana"
      - "nenhuma nova iteração iniciada sem HITL"
    negative_cases:
      - input: "error_streak_limit === 0"
        expected: "consecutive_errors acumula mas loop nunca é interrompido por essa condição"
